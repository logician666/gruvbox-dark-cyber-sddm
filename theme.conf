[General]
# Procedural background drawn in Main.qml (gruvbox graph-paper dot grid).
type=color
color=#282828

font="Inter"
fontSize=14

# Clock: monospace, echoing the terminal stack (JetBrains Mono).
clockColor=#d4be98
clockFont="JetBrainsMono Nerd Font"
clockFontSize=72

# Date: ISO 8601, muted.
dateColor=#928374
dateFont="JetBrainsMono Nerd Font"
dateFontSize=20

# Gruvbox Material accents — same hex used across kitty/tmux/nvim.
accentColor=#d8a657
gridColor=#32302f
passwordColor=#d4be98
passwordBackground=#32302f
passwordBorder=#504945
loginColor=#d4be98
loginBackground=#3c3836
loginBorder=#504945
