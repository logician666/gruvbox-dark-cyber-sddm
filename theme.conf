[General]
# Gruvbox wallpaper (matches the desktop) + a faint graph-paper grid drawn
# over it in Main.qml, with a scrim for text legibility.
type=image
background=wallpapers/gruvbox-lines.jpg
color=#282828

font="Inter"
fontSize=16

# Clock: monospace, echoing the terminal stack (JetBrains Mono).
clockColor=#d4be98
clockFont="JetBrainsMono Nerd Font"
clockFontSize=96

# Date: ISO 8601, muted.
dateColor=#a89984
dateFont="JetBrainsMono Nerd Font"
dateFontSize=26

# Gruvbox Material accents — same hex used across kitty/tmux/nvim.
accentColor=#d8a657
gridColor=#3c3836
passwordColor=#d4be98
passwordBackground=#32302f
passwordBorder=#504945
loginColor=#d4be98
loginBackground=#3c3836
loginBorder=#504945
